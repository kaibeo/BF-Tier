<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Discord — RC Tier</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .discord-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .discord-card {
      max-width: 420px;
      width: 100%;
      background: var(--bg-glass-heavy, rgba(7,6,13,0.92));
      border: 1px solid rgba(140,100,255,0.18);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
    }
    .discord-card .discord-icon-wrap {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: rgba(88,101,242,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #5865F2;
    }
    .discord-card h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      margin: 0 0 10px;
      color: #fff;
    }
    .discord-card p {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      line-height: 1.5;
      margin: 0 0 28px;
    }
    .discord-join-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 20px;
      background: #5865F2;
      color: #fff;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      transition: background 0.2s ease, transform 0.15s ease;
    }
    .discord-join-btn:hover {
      background: #4752C4;
      transform: translateY(-1px);
    }
    .discord-back {
      display: inline-block;
      margin-top: 20px;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      text-decoration: none;
    }
    .discord-back:hover { color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>

  <svg xmlns="http://www.w3.org/2000/svg" style="display:none;">
    <symbol id="icon-discord" viewBox="0 0 24 24" fill="currentColor">
      <path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
    </symbol>
  </svg>

  <div class="discord-page">
    <div class="discord-card">
      <div class="discord-icon-wrap">
        <svg width="32" height="32"><use href="#icon-discord"/></svg>
      </div>
      <h1>Join the RC Tier Discord</h1>
      <p>Connect with the community, track ranking updates, and chat with other players. Click below to head to our Discord server.</p>
      <!-- Replace the href below with your actual Discord invite link -->
      <a href="https://discord.gg/YOUR-INVITE-CODE" target="_blank" rel="noopener noreferrer" class="discord-join-btn">
        <svg width="18" height="18"><use href="#icon-discord"/></svg>
        <span>Open Discord</span>
      </a>
      <a href="index.html" class="discord-back">← Back to RC Tier</a>
    </div>
  </div>

</body>
</html>
