<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Discord — RC Tier</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { overflow-x: hidden; }

    .discord-page {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 1;
    }

    .nebula-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.55;
    }
    .nebula-blob.b1 {
      width: 480px; height: 480px;
      top: -160px; left: -140px;
      background: radial-gradient(circle, rgba(168,85,247,0.55), transparent 70%);
      animation: driftA 16s ease-in-out infinite alternate;
    }
    .nebula-blob.b2 {
      width: 420px; height: 420px;
      bottom: -160px; right: -120px;
      background: radial-gradient(circle, rgba(88,101,242,0.5), transparent 70%);
      animation: driftB 18s ease-in-out infinite alternate;
    }
    .nebula-blob.b3 {
      width: 300px; height: 300px;
      top: 40%; right: 10%;
      background: radial-gradient(circle, rgba(236,72,153,0.35), transparent 70%);
      animation: driftC 20s ease-in-out infinite alternate;
    }
    @keyframes driftA { from { transform: translate(0,0) scale(1); } to { transform: translate(40px,30px) scale(1.08); } }
    @keyframes driftB { from { transform: translate(0,0) scale(1); } to { transform: translate(-30px,-40px) scale(1.1); } }
    @keyframes driftC { from { transform: translate(0,0) scale(1); } to { transform: translate(-25px,25px) scale(0.95); } }

    .discord-card {
      position: relative;
      max-width: 460px;
      width: 100%;
      background: rgba(9, 7, 18, 0.72);
      border: 1px solid rgba(168, 85, 247, 0.22);
      border-radius: 22px;
      padding: 40px 30px 32px;
      text-align: center;
      backdrop-filter: blur(22px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(168,85,247,0.06), 0 0 60px rgba(88,101,242,0.08);
      animation: cardIn 0.55s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .discord-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 22px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(168,85,247,0.5), rgba(88,101,242,0.15), rgba(236,72,153,0.35));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.7;
    }

    .discord-card .discord-icon-wrap {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(88,101,242,0.28), rgba(88,101,242,0.08));
      border: 1px solid rgba(88,101,242,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8b93ff;
      box-shadow: 0 0 30px rgba(88,101,242,0.35);
      animation: iconPulse 2.6s ease-in-out infinite;
    }
    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 0 24px rgba(88,101,242,0.3); }
      50% { box-shadow: 0 0 42px rgba(88,101,242,0.55); }
    }

    .discord-card h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      margin: 0 0 8px;
      background: linear-gradient(135deg, #fff, #c9b8ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 0.3px;
    }
    .discord-card p {
      color: rgba(255,255,255,0.55);
      font-size: 13.5px;
      line-height: 1.5;
      margin: 0 0 28px;
    }

    .discord-server-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: left;
    }
    .discord-server-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 13px;
      text-decoration: none;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.18s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .discord-server-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(168,85,247,0.14), rgba(88,101,242,0.1));
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .discord-server-btn:hover {
      border-color: rgba(168,85,247,0.4);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(88,101,242,0.18);
    }
    .discord-server-btn:hover::before { opacity: 1; }
    .discord-server-btn > * { position: relative; z-index: 1; }

    .discord-server-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .discord-server-icon img { width: 20px; height: 20px; object-fit: contain; }

    .discord-server-name { flex: 1; color: #fff; font-weight: 600; font-size: 14.5px; }

    .discord-server-arrow {
      color: #a78bfa;
      flex-shrink: 0;
      transition: transform 0.2s ease;
    }
    .discord-server-btn:hover .discord-server-arrow { transform: translateX(3px); }

    .discord-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 26px;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      text-decoration: none;
      transition: color 0.18s ease;
    }
    .discord-back:hover { color: rgba(255,255,255,0.75); }
  </style>
</head>
<body>

  <canvas id="starfield"></canvas>

  <div class="nebula-blob b1"></div>
  <div class="nebula-blob b2"></div>
  <div class="nebula-blob b3"></div>

  <svg xmlns="http://www.w3.org/2000/svg" style="display:none;">
    <symbol id="icon-discord" viewBox="0 0 24 24" fill="currentColor">
      <path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
    </symbol>
    <symbol id="icon-arrow-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 6l6 6-6 6"/>
    </symbol>
    <symbol id="icon-arrow-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 6l-6 6 6 6"/>
    </symbol>
  </svg>

  <div class="discord-page">
    <div class="discord-card">
      <div class="discord-icon-wrap">
        <svg width="32" height="32"><use href="#icon-discord"/></svg>
      </div>
      <h1>Join an RC Tier Discord</h1>
      <p>Each gamemode has its own server. Pick the one you want to join below.</p>

      <div class="discord-server-list">

          <span class="discord-server-icon"><img src="https://minecraft.wiki/images/Invicon_Water_Bucket.png" alt="" /></span>
          <span class="discord-server-name">UHC PvP</span>
          <svg class="discord-server-arrow" width="18" height="18"><use href="#icon-arrow-right"/></svg>

        <a href="https://discord.gg/POT-INVITE" target="_blank" rel="noopener noreferrer" class="discord-server-btn">
          <span class="discord-server-icon"><img src="https://minecraft.wiki/images/Invicon_Potion_of_Healing.png" alt="" /></span>
          <span class="discord-server-name">Pot PvP</span>
          <svg class="discord-server-arrow" width="18" height="18"><use href="#icon-arrow-right"/></svg>
        </a>
        <a href="https://discord.gg/wvUKArJHWC" target="_blank" rel="noopener noreferrer" class="discord-server-btn">
          <span class="discord-server-icon"><img src="https://minecraft.wiki/images/Invicon_Netherite_Chestplate.png" alt="" /></span>
          <span class="discord-server-name">Neth PvP</span>
          <svg class="discord-server-arrow" width="18" height="18"><use href="#icon-arrow-right"/></svg>
        </a>
        <a href="https://discord.gg/SMP-INVITE" target="_blank" rel="noopener noreferrer" class="discord-server-btn">
          <span class="discord-server-icon"><img src="https://minecraft.wiki/images/Invicon_Shield.png" alt="" /></span>
          <span class="discord-server-name">Smp PvP</span>
          <svg class="discord-server-arrow" width="18" height="18"><use href="#icon-arrow-right"/></svg>
        </a>
        <a href="https://discord.gg/SWORD-INVITE" target="_blank" rel="noopener noreferrer" class="discord-server-btn">
          <span class="discord-server-icon"><img src="https://minecraft.wiki/images/Invicon_Diamond_Sword.png" alt="" /></span>

        <a href="https://discord.gg/AXE-INVITE" target="_blank" rel="noopener noreferrer" class="discord-server-btn">
          <span class="discord-server-icon"><img src="https://minecraft.wiki/images/Invicon_Diamond_Axe.png" alt="" /></span>
          <span class="discord-server-name">Axe PvP</span>

        </a>
        <a href="https://discord.gg/MACE-INVITE" target="_blank" rel="noopener noreferrer" class="discord-server-btn">
          <span class="discord-server-icon"><img src="https://minecraft.wiki/images/Invicon_Mace.png" alt="" /></span>
          <span class="discord-server-name">Mace PvP</span>
          <svg class="discord-server-arrow" width="18" height="18"><use href="#icon-arrow-right"/></svg>
        </a>
      </div>

      <a href="index.html" class="discord-back">
        <svg width="14" height="14"><use href="#icon-arrow-left"/></svg>
        Back to RC Tier
      </a>
    </div>
  </div>

  <script>
    (function () {
      const canvas = document.getElementById('starfield');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let stars = [];
      const STAR_COUNT = window.innerWidth < 768 ? 70 : 120;
      let resizeTimeout;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function initStars() {
        stars = Array.from({ length: STAR_COUNT }, () => ({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.4 + 0.3,
          alpha: Math.random() * 0.6 + 0.2,
          twinkleSpeed: Math.random() * 0.015 + 0.004,
          twinkleDir: Math.random() > 0.5 ? 1 : -1,
        }));
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const s of stars) {
          s.alpha += s.twinkleSpeed * s.twinkleDir;
          if (s.alpha <= 0.15 || s.alpha >= 0.9) s.twinkleDir *= -1;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
          ctx.fill();
        }
        requestAnimationFrame(draw);
      }

      resize();
      initStars();
      draw();

      window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          resize();
          initStars();
        }, 200);
      });
    })();
  </script>

</body>
</html>
