<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Discord — RC Tier</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .discord-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .discord-card {
      max-width: 460px;
      width: 100%;
      background: var(--bg-glass-heavy, rgba(7,6,13,0.92));
      border: 1px solid rgba(140,100,255,0.18);
      border-radius: 20px;
      padding: 36px 28px;
      text-align: center;
    }
    .discord-card .discord-icon-wrap {
      width: 60px;
      height: 60px;
      margin: 0 auto 18px;
      border-radius: 50%;
      background: rgba(88,101,242,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #5865F2;
    }
    .discord-card h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 19px;
      margin: 0 0 8px;
      color: #fff;
    }
    .discord-card p {
      color: rgba(255,255,255,0.6);
      font-size: 13.5px;
      line-height: 1.5;
      margin: 0 0 26px;
    }
    .discord-server-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: left;
    }
    .discord-server-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px 16px;
      background: rgba(88,101,242,0.10);
      border: 1px solid rgba(88,101,242,0.28);
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.15s ease;
    }
    .discord-server-btn:hover {
      background: rgba(88,101,242,0.22);
      border-color: rgba(88,101,242,0.55);
      transform: translateY(-1px);
    }
    .discord-server-icon {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }
    .discord-server-icon img {
      width: 20px;
      height: 20px;
      object-fit: contain;
    }
    .discord-server-name {
      flex: 1;
      color: #fff;
      font-weight: 600;
      font-size: 14.5px;
    }
    .discord-server-arrow {
      color: #5865F2;
      flex-shrink: 0;
    }
    .discord-back {
      display: inline-block;
      margin-top: 24px;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      text-decoration: none;
    }
    .discord-back:hover { color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>
