  <!-- ========== CONTROLS ========== -->
  <section class="controls-section">
    <div class="gamemode-tabs" id="gamemodeTabs">
      <button class="gamemode-tab active" data-mode="overall">
        <img class="tab-icon-svg gamemode-item-img" src="overall-sword.jpg" width="18" height="18" alt="" onerror="this.outerHTML='<svg class=&quot;tab-icon-svg&quot; width=&quot;18&quot; height=&quot;18&quot;><use href=&quot;#icon-crosshair&quot;/></svg>'" />

        <span class="tab-count" data-count="overall">0</span>
      </button>
      <button class="gamemode-tab" data-mode="vanilla">
        <img class="tab-icon-svg gamemode-item-img" src="https://minecraft.wiki/images/Invicon_End_Crystal.gif" width="18" height="18" alt="" onerror="this.outerHTML='<svg class=&quot;tab-icon-svg&quot; width=&quot;18&quot; height=&quot;18&quot;><use href=&quot;#icon-crystal&quot;/></svg>'" />

        <span class="tab-count" data-count="vanilla">0</span>

      <button class="gamemode-tab" data-mode="uhc">

    <div class="filter-row">
      <div class="search-wrapper">
        <input type="text" class="search-input" id="searchInput" placeholder="Search players..." autocomplete="off" />
        <svg class="search-icon-svg" width="18" height="18"><use href="#icon-search"/></svg>
      </div>
      <div class="region-select-wrapper" id="regionSelectWrapper">
        <button type="button" class="region-select-btn" id="regionSelectBtn">
          <span id="regionSelectLabel">All Regions</span>
          <svg class="region-select-caret" width="14" height="14"><use href="#icon-chevron-down"/></svg>
        </button>
        <div class="region-select-menu" id="regionSelectMenu">
          <button type="button" class="region-select-option active" data-value="all">All Regions</button>
          <button type="button" class="region-select-option" data-value="NA">NA — North America</button>
          <button type="button" class="region-select-option" data-value="EU">EU — Europe</button>
          <button type="button" class="region-select-option" data-value="AS">AS — Asia</button>
          <button type="button" class="region-select-option" data-value="AU">AU — Oceania</button>
          <button type="button" class="region-select-option" data-value="SA">SA — South America</button>
        </div>
      </div>
      <button class="sort-btn" id="sortBtn" title="Toggle sort order">
        <svg width="16" height="16"><use href="#icon-sort"/></svg>
        <span id="sortLabel">Elo</span>
      </button>
    </div>
  </section>
