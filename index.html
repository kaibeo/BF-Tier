<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MC Tierlist — Minecraft PvP Rankings</title>
  <meta name="description" content="The definitive Minecraft PvP Tier List. Browse top-ranked players across Sword, Axe, Crystal, Pot, and UHC gamemodes." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ========== STAR CANVAS ========== -->
  <canvas id="starfield"></canvas>

  <!-- ========== SVG ICON DEFINITIONS ========== -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none;">
    <!-- Sword -->
    <symbol id="icon-sword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.5 3L21 3L21 9.5L12 18.5L5.5 12L14.5 3Z"/>
      <path d="M5.5 12L2 15.5L5 18.5L8.5 15"/>
      <line x1="18" y1="6" x2="15" y2="9"/>
    </symbol>
    <!-- Axe -->
    <symbol id="icon-axe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 4L20 10"/>
      <path d="M5 19L14 10"/>
      <path d="M14 4C14 4 18 3 20 5C22 7 20.5 10.5 20 10.5"/>
      <path d="M14 4C14 4 13 8 14.5 9.5C16 11 20 10 20 10"/>
      <circle cx="5" cy="19" r="1.5"/>
    </symbol>
    <!-- Crystal -->
    <symbol id="icon-crystal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12,2 22,9 18,22 6,22 2,9"/>
      <line x1="12" y1="2" x2="12" y2="22"/>
      <line x1="2" y1="9" x2="22" y2="9"/>
      <line x1="6" y1="22" x2="22" y2="9"/>
      <line x1="18" y1="22" x2="2" y2="9"/>
    </symbol>
    <!-- Potion -->
    <symbol id="icon-pot" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 2L14 2"/>
      <path d="M12 2L12 6"/>
      <path d="M8 6L16 6"/>
      <path d="M8 6L5 13C3.5 16.5 5.5 21 12 21C18.5 21 20.5 16.5 19 13L16 6"/>
      <path d="M6.5 14C6.5 14 9 16 12 14C15 12 17.5 14 17.5 14"/>
    </symbol>
    <!-- UHC Heart -->
    <symbol id="icon-uhc" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 21C12 21 3 14.5 3 8.5C3 5.42 5.42 3 8.5 3C10.24 3 11.91 3.81 12 5C12.09 3.81 13.76 3 15.5 3C18.58 3 21 5.42 21 8.5C21 14.5 12 21 12 21Z"/>
      <path d="M12 21L12 13" opacity="0.4"/>
      <path d="M8 13L16 13" opacity="0.4"/>
    </symbol>
    <!-- Vanilla (Golden Apple) -->
    <symbol id="icon-vanilla" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3C10.5 3 9.5 4.2 9.5 5.2C9.5 4 8.3 3 7 3.6C5.8 4.1 5.6 5.6 6.5 6.5"/>
      <path d="M12 6C7.5 6 4 9.5 4 14C4 18.5 8 21 12 21C16 21 20 18.5 20 14C20 9.5 16.5 6 12 6Z"/>
      <path d="M9 12L11 14L15 10" opacity="0.7"/>
    </symbol>
    <!-- NethPot (Nether Portal + Potion) -->
    <symbol id="icon-nethpot" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 3v18"/>
      <path d="M16 3v18"/>
      <path d="M8 3h8"/>
      <path d="M8 21h8"/>
      <path d="M11 8c-1 1.5-1 3.5 1 5c2-1.5 2-3.5 1-5" opacity="0.6"/>
    </symbol>
    <!-- SMP (Grass Block) -->
    <symbol id="icon-smp" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="1"/>
      <path d="M3 9h18" opacity="0.7"/>
      <path d="M6 6h2M10 5.5h2M15 6h2" stroke-width="2.4" opacity="0.9"/>
    </symbol>
    <!-- DiaSMP (Diamond + Grass) -->
    <symbol id="icon-diasmp" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12,3 19,9 15.5,20 8.5,20 5,9"/>
      <line x1="12" y1="3" x2="12" y2="20" opacity="0.5"/>
      <line x1="5" y1="9" x2="19" y2="9" opacity="0.5"/>
    </symbol>
    <!-- Mace -->
    <symbol id="icon-mace" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 21L15 14"/>
      <rect x="14.5" y="3.5" width="6" height="6" rx="1" transform="rotate(45 17.5 6.5)"/>
      <path d="M15.5 8.5L17.5 6.5"/>
      <circle cx="17.5" cy="6.5" r="1.2" opacity="0.6"/>
    </symbol>
    <!-- Verified Badge -->
    <symbol id="icon-verified" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 1.5l2.6 1.53 3.02-.36 1.36 2.7 2.7 1.36-.36 3.02L23 12l-1.68 2.25.36 3.02-2.7 1.36-1.36 2.7-3.02-.36L12 22.5l-2.6-1.53-3.02.36-1.36-2.7-2.7-1.36.36-3.02L1 12l1.68-2.25-.36-3.02 2.7-1.36 1.36-2.7 3.02.36L12 1.5z"/>
      <path d="M8.5 12.2l2.4 2.4 4.6-4.9" fill="none" stroke="#07060D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <!-- Search -->
    <symbol id="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7"/>
      <line x1="16.5" y1="16.5" x2="21" y2="21"/>
    </symbol>
    <!-- Arrow Up -->
    <symbol id="icon-arrow-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="19" x2="12" y2="5"/>
      <polyline points="5 12 12 5 19 12"/>
    </symbol>
    <!-- Arrow Down -->
    <symbol id="icon-arrow-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <polyline points="19 12 12 19 5 12"/>
    </symbol>
    <!-- Dash / Stable -->
    <symbol id="icon-dash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="6" y1="12" x2="18" y2="12"/>
    </symbol>
    <!-- Discord -->
    <symbol id="icon-discord" viewBox="0 0 24 24" fill="currentColor">
      <path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
    </symbol>
    <!-- YouTube -->
    <symbol id="icon-youtube" viewBox="0 0 24 24" fill="currentColor">
      <path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
    </symbol>
    <!-- Twitch -->
    <symbol id="icon-twitch" viewBox="0 0 24 24" fill="currentColor">
      <path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/>
    </symbol>
    <!-- Sort -->
    <symbol id="icon-sort" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M7 4L7 20M7 4L3 8M7 4L11 8"/>
      <path d="M17 20L17 4M17 20L13 16M17 20L21 16"/>
    </symbol>
    <!-- Cross / Close -->
    <symbol id="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </symbol>
    <!-- Globe -->
    <symbol id="icon-globe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <ellipse cx="12" cy="12" rx="4" ry="10"/>
      <line x1="2" y1="12" x2="22" y2="12"/>
    </symbol>
    <!-- Users -->
    <symbol id="icon-users" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 00-3-3.87"/>
      <path d="M16 3.13a4 4 0 010 7.75"/>
    </symbol>
    <!-- Calendar -->
    <symbol id="icon-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </symbol>
    <!-- Crosshair / Target -->
    <symbol id="icon-crosshair" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <circle cx="12" cy="12" r="4"/>
      <line x1="12" y1="2" x2="12" y2="6"/>
      <line x1="12" y1="18" x2="12" y2="22"/>
      <line x1="2" y1="12" x2="6" y2="12"/>
      <line x1="18" y1="12" x2="22" y2="12"/>
    </symbol>
    <!-- Trophy -->
    <symbol id="icon-trophy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 9H3a1 1 0 01-1-1V5a1 1 0 011-1h3"/>
      <path d="M18 9h3a1 1 0 001-1V5a1 1 0 00-1-1h-3"/>
      <path d="M6 4h12v6a6 6 0 11-12 0V4z"/>
      <path d="M12 16v3"/>
      <path d="M8 22h8"/>
      <path d="M8 22v-3h8v3"/>
    </symbol>
    <!-- Shield -->
    <symbol id="icon-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </symbol>
  </svg>

  <!-- ========== NAVBAR ========== -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="#" class="logo">
        <div class="logo-icon">
          <svg width="20" height="20"><use href="#icon-sword"/></svg>
        </div>
        <span class="logo-text">MC TIERLIST</span>
        <span class="logo-tag">PVP</span>
      </a>
      <div class="navbar-stats">
        <div class="stat-item">
          <svg width="15" height="15" class="stat-icon"><use href="#icon-users"/></svg>
          <span>Players</span>
          <span class="stat-value" id="totalPlayers">0</span>
        </div>
        <div class="stat-item">
          <svg width="15" height="15" class="stat-icon"><use href="#icon-crosshair"/></svg>
          <span>Modes</span>
          <span class="stat-value">9</span>
        </div>
        <div class="stat-item">
          <svg width="15" height="15" class="stat-icon"><use href="#icon-calendar"/></svg>
          <span>Updated</span>
          <span class="stat-value">Jul 2026</span>
        </div>
      </div>
      <a href="https://discord.gg/" target="_blank" rel="noopener noreferrer" class="discord-cta">
        <svg width="17" height="17"><use href="#icon-discord"/></svg>
        <span>Join Discord</span>
      </a>
    </div>
  </nav>

  <!-- ========== CONTROLS ========== -->
  <section class="controls-section">
    <div class="gamemode-tabs" id="gamemodeTabs">
      <button class="gamemode-tab active" data-mode="overall">
        <svg class="tab-icon-svg" width="18" height="18"><use href="#icon-crosshair"/></svg>
        <span>Overall</span>
        <span class="tab-count" data-count="overall">0</span>
      </button>
      <button class="gamemode-tab" data-mode="vanilla">
        <svg class="tab-icon-svg" width="18" height="18"><use href="#icon-vanilla"/></svg>
        <span>Vanilla</span>
        <span class="tab-count" data-count="vanilla">0</span>
      </button>
      <button class="gamemode-tab" data-mode="uhc">
        <svg class="tab-icon-svg" width="18" height="18"><use href="#icon-uhc"/></svg>
        <span>UHC</span>
        <span class="tab-count" data-count="uhc">0</span>
      </button>
      <button class="gamemode-tab" data-mode="pot">
        <svg class="tab-icon-svg" width="18" height="18"><use href="#icon-pot"/></svg>
        <span>Pot</span>
        <span class="tab-count" data-count="pot">0</span>
      </button>
      <button class="gamemode-tab" data-mode="nethop">
        <svg class="tab-icon-svg" width="18" height="18"><use href="#icon-nethpot"/></svg>
        <span>NethOP</span>
        <span class="tab-count" data-count="nethop">0</span>
      </button>
      <button class="gamemode-tab" data-mode="smp">
        <svg class="tab-icon-svg" width="18" height="18"><use href="#icon-smp"/></svg>
        <span>SMP</span>
        <span class="tab-count" data-count="smp">0</span>
      </button>
      <button class="gamemode-tab" data-mode="sword">
        <svg class="tab-icon-svg" width="18" height="18"><use href="#icon-sword"/></svg>
        <span>Sword</span>
        <span class="tab-count" data-count="sword">0</span>
      </button>
      <button class="gamemode-tab" data-mode="axe">
        <svg class="tab-icon-svg" width="18" height="18"><use href="#icon-axe"/></svg>
        <span>Axe</span>
        <span class="tab-count" data-count="axe">0</span>
      </button>
      <button class="gamemode-tab" data-mode="mace">
        <svg class="tab-icon-svg" width="18" height="18"><use href="#icon-mace"/></svg>
        <span>Mace</span>
        <span class="tab-count" data-count="mace">0</span>
      </button>
    </div>

    <div class="filter-row">
      <div class="search-wrapper">
        <input type="text" class="search-input" id="searchInput" placeholder="Search players..." autocomplete="off" />
        <svg class="search-icon-svg" width="18" height="18"><use href="#icon-search"/></svg>
      </div>
      <div class="region-select-wrapper">
        <select class="region-select" id="regionFilter">
          <option value="all">All Regions</option>
          <option value="NA">NA — North America</option>
          <option value="EU">EU — Europe</option>
          <option value="AS">AS — Asia</option>
          <option value="AU">AU — Oceania</option>
          <option value="SA">SA — South America</option>
        </select>
      </div>
      <button class="sort-btn" id="sortBtn" title="Toggle sort order">
        <svg width="16" height="16"><use href="#icon-sort"/></svg>
        <span id="sortLabel">Elo</span>
      </button>
    </div>
  </section>

  <!-- ========== TIER LIST ========== -->
  <main class="tierlist-container" id="tierlistContainer">
    <!-- Rendered by JS -->
  </main>

  <!-- ========== MODAL ========== -->
  <div class="modal-overlay" id="playerModal">
    <div class="modal-content">
      <button class="modal-close" id="modalClose" aria-label="Close modal">
        <svg width="16" height="16"><use href="#icon-close"/></svg>
      </button>
      <div class="modal-header">
        <img class="modal-avatar" id="modalAvatar" src="" alt="Player avatar" />
        <div class="modal-player-info">
          <div class="modal-player-name" id="modalName"></div>
          <div class="modal-player-title" id="modalPlayerTitle"></div>
          <div class="modal-player-tier" id="modalTier"></div>
          <div class="modal-player-region" id="modalRegion"></div>
        </div>
      </div>
      <div class="modal-body">
        <div class="modal-section">
          <div class="modal-section-title">Stats</div>
          <div class="modal-stats-grid" id="modalStats"></div>
        </div>
        <div class="modal-section">
          <div class="modal-section-title">Links</div>
          <div class="modal-links" id="modalLinks"></div>
        </div>
        <div class="modal-section">
          <div class="modal-section-title">Tier History</div>
          <div class="tier-timeline" id="modalTimeline"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== FOOTER ========== -->
  <footer class="footer">
    <span class="footer-text">© 2026 MC Tierlist — Not affiliated with Mojang Studios</span>
    <div class="footer-links">
      <a href="https://discord.gg/" target="_blank" rel="noopener noreferrer" class="footer-link">Discord</a>
      <a href="#" class="footer-link">Twitter</a>
      <a href="#" class="footer-link">GitHub</a>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
